<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Torrent — Purefusion TorrentBridge</title>
  <link rel="stylesheet" href="extension.css">
  <style>
    body {
      width: 420px;
      min-height: auto;
      padding: 0;
    }
    .extension-main {
      padding: 20px;
      gap: 16px;
    }
  </style>
</head>
<body data-theme="dark">

<header class="extension-header" style="padding: 16px 20px; gap: 10px;">
  <img src="../icon/icon_48.png" alt="Logo" class="extension-logo" style="width: 28px; height: 28px;">
  <h1 class="extension-title" style="font-size: 1.1rem;" data-i18n="addTorrentTitle">Add Torrent</h1>
</header>

<main class="extension-main">
  <section class="options-card">
    <div class="panel-section-formElements">

      <div class="panel-formElements-item">
        <label for="url" data-i18n="torrentUrl">Torrent URL</label>
        <input type="text" id="url" disabled aria-label="Torrent URL" style="font-size: 0.78rem;">
      </div>

      <div class="panel-formElements-item">
        <label for="server" data-i18n="serverNameOption">Server</label>
        <select id="server" aria-label="Server List">
          <option value="" data-i18n="defaultOption">Select a server</option>
        </select>
      </div>

      <div class="panel-formElements-item">
        <label for="downloadLocation" data-i18n="downloadLocationSelect">Download Location</label>
        <select id="downloadLocation" aria-label="Download Location">
          <option value="" data-i18n="defaultOption">Select a location</option>
        </select>
      </div>

      <div class="panel-formElements-item">
        <label for="labels" data-i18n="labelSelect">Label</label>
        <select id="labels" aria-label="Label Selection">
          <option value="" data-i18n="noneOption">None</option>
        </select>
      </div>

      <div class="toggle-item">
        <div class="toggle-item__label" data-i18n="addAsPausedOption">Add as Paused</div>
        <label class="toggle-switch">
          <input type="checkbox" id="addpaused">
          <span class="toggle-switch__slider"></span>
        </label>
      </div>

    </div>
  </section>

  <button id="add-torrent" class="btn-primary" style="width: 100%; padding: 13px;" data-i18n="addTorrentAction">
    📥 Add Torrent
  </button>
</main>

<script type="module" src="add_torrent.js"></script>
</body>
</html>
